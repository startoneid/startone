<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>StarTone | Tracking</title>
    
    <link rel="icon" href="icon/StarTone Circle.png">
    
    <meta name="description" content="Lacak status pesanan StarTone menggunakan invoice.">
    <meta name="robots" content="noindex,nofollow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="CSS/tracking.css">
</head>
<body>

<div class="container">
    <h1>Track Order</h1>
    <p>Masukkan nomor invoice dan email yang digunakan saat checkout.</p>
    
    <input id="invoice" placeholder="Invoice">
    <input id="email" placeholder="Email">
    
    <button id="checkBtn">Cek Status</button>
    
    <div id="result"></div>
</div>

<script type="module">
    // 1. Import SDK Firebase langsung dari CDN resmi
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 2. Konfigurasi Firebase milik StarTone
    const firebaseConfig = {
      apiKey: "AIzaSyCe_fBo7M-2kROpNPpMfnI6qbZPXfHj8dE",
      authDomain: "startone-d8aee.firebaseapp.com",
      projectId: "startone-d8aee",
      storageBucket: "startone-d8aee.firebasestorage.app",
      messagingSenderId: "656485405720",
      appId: "1:656485405720:web:8c6473209c12103c43df6d",
    };

    // 3. Inisialisasi koneksi ke Database
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const btn = document.getElementById("checkBtn");

    function escapeHTML(str) {
        const div = document.createElement("div");
        div.textContent = str ?? "";
        return div.innerHTML;
    }

    // Rate limit sederhana di sisi klien: mencegah klik/percobaan
    // beruntun cepat (mis. script yang mencoba menebak-nebak invoice).
    const RATE_LIMIT_KEY = "startone_last_track_check";
    const RATE_LIMIT_SECONDS = 3;

    function checkRateLimit() {
        const last = Number(localStorage.getItem(RATE_LIMIT_KEY) || 0);
        const diffSeconds = (Date.now() - last) / 1000;
        if (diffSeconds < RATE_LIMIT_SECONDS) return false;
        localStorage.setItem(RATE_LIMIT_KEY, String(Date.now()));
        return true;
    }

    btn.onclick = async () => {
        const invoice = document.getElementById("invoice").value.trim();
        const email = document.getElementById("email").value.trim();
        const result = document.getElementById("result");

        // Validasi input kosong
        if (!invoice || !email) {
            result.innerHTML = "<p style='color:#FFD166; margin-top:20px; font-weight:bold;'>⚠️ Mohon isi Invoice dan Email terlebih dahulu.</p>";
            return;
        }

        if (!checkRateLimit()) {
            result.innerHTML = "<p style='color:#FFD166; margin-top:20px; font-weight:bold;'>⏳ Mohon tunggu sebentar sebelum mencoba lagi.</p>";
            return;
        }

        btn.disabled = true;
        const originalBtnText = btn.textContent;
        btn.textContent = "Mencari...";

        result.innerHTML = `
            <div class="tracking-loading" style="margin-top:20px;display:flex;align-items:center;gap:10px;color:#bbb;">
                <span class="tracking-spinner"></span> Mencari data pesananmu...
            </div>
        `;

        try {
            // Ambil 1 dokumen langsung lewat ID (invoice number), BUKAN query
            // ke seluruh koleksi "orders". Ini mencegah data pesanan pelanggan
            // lain ikut terbaca/terekspos di jaringan browser.
            const orderSnap = await getDoc(doc(db, "orders", invoice));

            if (!orderSnap.exists() || orderSnap.data().email !== email) {
                result.innerHTML = "<p style='color:#FF5555; margin-top:20px; font-weight:bold;'>❌ Order tidak ditemukan. Periksa kembali Invoice/Email Anda.</p>";
                return;
            }

            const data = orderSnap.data();
            let statusIcon = "🟡";

            if (data.status === "verified") statusIcon = "🟢";
            if (data.status === "rejected") statusIcon = "🔴";

            let download = "";

            if (data.status === "verified" && data.downloadURL) {
                download = `
                    <br><br>
                    <a href="${escapeHTML(data.downloadURL)}" download style="display:inline-block; background:#FFD166; color:#222; padding:12px 25px; border-radius:10px; text-decoration:none; font-weight:bold; width:100%; text-align:center;">
                        ⬇️ Download Produk
                    </a>
                `;
            }

            // Menampilkan komponen status pesanan yang bisa ditekan tombol downloadnya
            // (semua data yang berasal dari input pengguna di-escape untuk mencegah XSS)
            result.innerHTML = `
                <div class="card">
                    <h2>${escapeHTML(data.invoiceNumber)}</h2>
                    <p><b>Nama :</b> ${escapeHTML(data.customerName)}</p>
                    <p><b>Produk :</b> ${escapeHTML(data.product)}</p>
                    <p><b>Status :</b> ${statusIcon} ${escapeHTML(data.status)}</p>

                    <div class="progress">
                        <div class="step">
                            ${data.status === "waiting" ? "🟡" : "🟢"} Checkout
                        </div>
                        <div class="step">
                            ${data.status === "waiting_verification" || data.status === "verified" ? "🟢" : "⚪"} Pembayaran
                        </div>
                        <div class="step">
                            ${data.status === "verified" ? "🟢" : "🟠"} Verifikasi
                        </div>
                        <div class="step">
                            ${data.status === "verified" ? "🟢" : "⚪"} Download
                        </div>
                    </div>
                    ${download}
                </div>
            `;
        } catch (error) {
            console.error("Firebase Error:", error);
            result.innerHTML = "<p style='color:#FF5555; margin-top:20px;'>❌ Terjadi gangguan koneksi ke database.</p>";
        } finally {
            btn.disabled = false;
            btn.textContent = originalBtnText;
        }
    };
</script>

<script src="js/back-button.js"></script>

</body>
</html>
