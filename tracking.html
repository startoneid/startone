<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Order | StarTone</title>

<link rel="icon" href="icon/StarTone Circle.png">

<meta name="description"
content="Lacak status pesanan StarTone menggunakan invoice.">

<meta name="robots"
content="noindex,nofollow">

<link rel="stylesheet" href="CSS/tracking.css">

</head>

<body>

<div class="container">

<h1>Track Order</h1>

<p>

</p>

<input
id="invoice"
placeholder="Invoice">

<input
id="email"
placeholder="Email">

<button id="checkBtn">

Cek Status

</button>

<div id="result"></div>

</div>

<script type="module" src="JS/tracking.js"></script>

</body>
</html>
