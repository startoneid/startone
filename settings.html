</a>

</nav>

<button class="hamburger" id="hamburgerBtn" aria-label="Menu">
    <span></span><span></span><span></span>
</button>

</header>

<main id="main" class="page-shell">

<section class="section settings-section">

    <h1 class="title section-title" data-aos="fade-up">
        <i class="fa-solid fa-gear"></i> Pengaturan
    </h1>

    <p class="settings-intro" data-aos="fade-up">
        Saat ini pengaturan yang tersedia hanya untuk mengatur tampilan website.
        Pilihan kamu akan otomatis tersimpan di perangkat ini.
    </p>

    <div class="settings-card" data-aos="fade-up">

        <h3>Tampilan</h3>
        <p class="settings-card-desc">Pilih mode tampilan yang paling nyaman buat kamu.</p>

        <div class="theme-options" id="themeOptions">

            <button type="button" class="theme-option" id="themeOptionDark" data-theme-option="dark">
                <span class="theme-preview theme-preview--dark">
                    <span class="theme-preview-dot"></span>
                    <span class="theme-preview-bar"></span>
                    <span class="theme-preview-bar theme-preview-bar--short"></span>
                </span>
                <span class="theme-option-info">
                    <span class="theme-option-label"><i class="fa-solid fa-moon"></i> Mode Gelap</span>
                    <span class="theme-option-sub">Default — nyaman di mata, hemat baterai layar OLED.</span>
                </span>
                <i class="fa-solid fa-circle-check theme-option-check"></i>
            </button>

            <button type="button" class="theme-option" id="themeOptionLight" data-theme-option="light">
                <span class="theme-preview theme-preview--light">
                    <span class="swatch" style="background:#FFFFFF"></span>
                    <span class="swatch" style="background:#000080"></span>
                    <span class="swatch" style="background:#00BFFF"></span>
                    <span class="swatch" style="background:#D8DEEC"></span>
                    <span class="swatch" style="background:#B4CFEC"></span>
                </span>
                <span class="theme-option-info">
                    <span class="theme-option-label"><i class="fa-solid fa-sun"></i> Mode Terang</span>
                    <span class="theme-option-sub">Putih Bersih, Biru Tua, Biru Langit, Putih Kebiruan, Biru Pastel.</span>
                </span>
                <i class="fa-solid fa-circle-check theme-option-check"></i>
            </button>

        </div>

    </div>

</section>

</main>

<div id="footer-placeholder"></div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/toast.js"></script>

</body>
