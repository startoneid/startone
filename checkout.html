<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Checkout | StarTone</title>

<link rel="icon" href="icon/StarTone Circle.png">

<meta name="description"
content="Checkout pembelian preset Lightroom StarTone.">

<meta name="robots"
content="noindex,nofollow">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

.tutorial{
    max-width:900px;
    margin:auto;
}

.step{
    background:#35363A;
    padding:25px 30px;
    margin-bottom:20px;
    border-left:6px solid #FFD166;
    border-radius:12px;
    transition:.3s;
}

.step:hover{
    transform:translateX(8px);
}

.step h3{
    color:#FFD166;
    margin-bottom:10px;
    font-size:22px;
}

.step p{
    color:#ddd;
    line-height:1.8;
}

body{

background:#28282B;
color:white;
padding:50px;

}

.container{

max-width:900px;
margin:auto;

background:#35363A;

padding:40px;

border-radius:20px;

}



h1{

margin-bottom:30px;

}

.row{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

input{

width:100%;

padding:15px;

margin-bottom:20px;

background:#28282B;

border:none;

border-radius:10px;

color:white;

font-size:15px;

}

.summary{

margin-top:30px;

background:#28282B;

padding:25px;

border-radius:15px;

}

.item{

display:flex;

justify-content:space-between;

margin:15px 0;

}

.total{

font-size:22px;

font-weight:bold;

margin-top:20px;

}

/* Honeypot anti-bot: disembunyikan dari manusia tapi tetap ada di DOM
   supaya bot otomatis yang mengisi semua field akan terjebak. */
.honeypot-field{
    position:absolute;
    left:-9999px;
    top:-9999px;
    height:0;
    width:0;
    overflow:hidden;
}

.cf-turnstile{
    margin-top:20px;
}

button{

width:100%;

margin-top:35px;

padding:16px;

border:none;

border-radius:10px;

background:#FFD166;

font-size:18px;

font-weight:600;

cursor:pointer;

}

.section-title{
    text-align:left;
    margin-bottom:40px;
    font-size:40px;
    font-weight:700;
}

button:hover{

opacity:.9;

}

@media (max-width:992px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media (max-width:768px){
    .grid{
        grid-template-columns:1fr;
    }
}

#loadingScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#28282B;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.loader{
    width:70px;
    height:70px;
    border:6px solid #555;
    border-top:6px solid #FFD166;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:25px;
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }

}

#loadingScreen h2{
    color:white;
    margin-bottom:10px;
}

#loadingScreen p{
    color:#bbb;
}

/* ========================================== */
/* KODE RESPONSIF SMARTPHONE (TAMBAHAN BARU)  */
/* ========================================== */
@media (max-width: 768px) {
    body {
        padding: 20px 12px; /* Mengurangi padding luar di layar HP */
    }

    .container {
        padding: 25px 15px; /* Memperluas area form di dalam kotak */
        border-radius: 15px;
    }

    h1 {
        font-size: 26px; /* Menyesuaikan ukuran judul utama */
        margin-bottom: 20px;
    }

    .row {
        grid-template-columns: 1fr; /* Nama Depan dan Belakang otomatis menumpuk atas-bawah */
        gap: 0;
    }

    input {
        padding: 12px;
        font-size: 14px;
        margin-bottom: 15px;
    }

    label {
        font-size: 14px;
    }

    .summary {
        padding: 20px 15px;
        margin-top: 20px;
    }

    .summary h2 {
        font-size: 20px;
    }

    .item {
        font-size: 14px;
        margin: 10px 0;
    }

    .total {
        font-size: 18px;
        margin-top: 15px;
    }

    button {
        padding: 14px;
        font-size: 16px;
        margin-top: 25px;
    }
}

@media (max-width: 480px) {
    body {
        padding: 15px 8px;
    }

    .container {
        padding: 20px 12px;
    }

    h1 {
        font-size: 22px;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>Checkout</h1>

<form id="checkoutForm">

<div class="row">

<div>

<label>Nama Depan</label>

<input
type="text"
required>

</div>

<div>

<label>Nama Belakang</label>

<input
type="text"
required>

</div>

</div>

<label>Email</label>

<input
type="email"
required>

<label>Nomor Telepon</label>

<input
type="tel"
required>

<div class="summary">

<h2>Your Order</h2>

<div class="item">
    <span id="productName"></span>
    <span id="productPrice"></span>
</div>

<hr>

<div class="item">
    <strong>Subtotal</strong>
    <strong id="subtotal"></strong>
</div>

<div class="item total">
    <span>Total</span>
    <span id="total"></span>
</div>

</div>

<!-- Honeypot anti-bot: field ini disembunyikan dari manusia lewat CSS.
     Bot otomatis biasanya tetap mengisi semua field yang ada di HTML,
     jadi kalau field ini terisi, submission dianggap spam & ditolak. -->
<div class="honeypot-field" aria-hidden="true">
    <label for="website">Jangan isi kolom ini</label>
    <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
</div>

<!-- Cloudflare Turnstile (CAPTCHA gratis). Ganti data-sitekey di bawah
     dengan Site Key asli dari dashboard Cloudflare kamu (Turnstile). -->
<div class="cf-turnstile" data-sitekey="0x4AAAAAAD4j4xQkrfiYctfS" data-theme="dark" id="turnstileWidget"></div>

<button type="submit">

Lanjut ke Pembayaran

</button>

</form>

</div>

<script>

</script>

<script>

const name = localStorage.getItem("productName");
const price = Number(localStorage.getItem("productPrice"));

document.getElementById("productName").innerText = name;
document.getElementById("productPrice").innerText =
"Rp" + price.toLocaleString("id-ID");

document.getElementById("subtotal").innerText =
"Rp" + price.toLocaleString("id-ID");

document.getElementById("total").innerText =
"Rp" + price.toLocaleString("id-ID");


</script>

<div id="loadingScreen">

    <div class="loader"></div>

    <h2>Memproses Pesanan...</h2>

    <p>Mohon tunggu sebentar</p>

</div>

<script type="module" src="js/checkout.js"></script>



</body>

</html>
