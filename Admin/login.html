<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - StarTone</title>

<link rel="icon" href="../images/StarTone Circle.png">

<meta name="robots"
content="noindex,nofollow">

<link rel="stylesheet" href="style.css">

<style>

body{

display:flex;

justify-content:center;

align-items:center;

height:100vh;

background:#1f1f1f;

}

.login-box{

width:380px;

background:#2b2b2b;

padding:30px;

border-radius:12px;

}

.login-box h2{

text-align:center;

margin-bottom:25px;

color:#FFD166;

}

.login-box input{

width:100%;

padding:12px;

margin-bottom:15px;

border:none;

border-radius:8px;

font-size:15px;

}

.login-box button{

width:100%;

padding:12px;

background:#FFD166;

border:none;

border-radius:8px;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

#error{

margin-top:15px;

text-align:center;

color:red;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">

Login

</button>

<p id="error"></p>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
