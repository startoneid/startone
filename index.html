<!-- ===================== -->
<div class="product-modal" id="reviewModal">
    <div class="product-modal-content review-modal-content">
        <button class="product-modal-close" id="reviewModalClose" aria-label="Tutup">&times;</button>

        <h2>Tulis Ulasan</h2>
        <p>Bagikan pengalamanmu memakai preset StarTone.</p>

        <form id="reviewForm">

            <label for="reviewName">Nama</label>
            <input type="text" id="reviewName" placeholder="Nama kamu" maxlength="60" required>

            <label for="reviewProduct">Produk yang Dibeli</label>
            <input type="text" id="reviewProduct" placeholder="Contoh: Summer Tone" maxlength="100" required>

            <label for="reviewMessage">Pesan / Komentar</label>
            <textarea id="reviewMessage" placeholder="Ceritakan pengalamanmu memakai preset ini..." maxlength="300" rows="4" required></textarea>

            <label>Beri Bintang</label>
            <div class="star-rating" id="starRating">
                <i class="fa-regular fa-star" data-value="1"></i>
                <i class="fa-regular fa-star" data-value="2"></i>
                <i class="fa-regular fa-star" data-value="3"></i>
                <i class="fa-regular fa-star" data-value="4"></i>
                <i class="fa-regular fa-star" data-value="5"></i>
            </div>
            <input type="hidden" id="reviewRating" value="0">

            <button type="submit" class="btn btn-primary" id="reviewSubmitBtn" style="width:100%;margin-top:10px;">
                Kirim Ulasan
            </button>

        </form>

    </div>
</div>
